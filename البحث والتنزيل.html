<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحث عن أعمال جديدة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent1: #f59e0b;
            --accent2: #ef4444;
            --accent-soft: rgba(245, 158, 11, 0.18);
            --bg: #120c0a;
            --card: rgba(255, 255, 255, 0.045);
            --card-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.09);
            --text: #f4f5f8;
            --muted: #9aa0ad;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding: 0 0 20px;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }
        .orb.a { width: 480px; height: 480px; background: var(--accent1); top: -180px; left: -120px; }
        .orb.b { width: 420px; height: 420px; background: var(--accent2); bottom: -160px; right: -120px; opacity: 0.35; }

        header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 26px 20px 20px;
        }
        .badge {
            width: 58px; height: 58px;
            margin: 0 auto 12px;
            border-radius: 17px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            box-shadow: 0 14px 30px -10px var(--accent1);
        }
        header h1 {
            font-size: clamp(22px, 3.5vw, 32px);
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #c9cdd8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: var(--muted);
            font-size: 14px;
            margin-top: 6px;
        }
        .language-switch { position: absolute; inset-inline-end: 14px; top: 12px; display: inline-flex; align-items: center; gap: 3px; padding: 3px 5px; border: 1px solid var(--border); border-radius: 999px; background: rgba(18, 12, 10, .72); direction: ltr; }
        .language-switch button { border: 0; border-radius: 999px; padding: 3px 7px; background: transparent; color: var(--muted); font: 700 10px 'Cairo', sans-serif; cursor: pointer; }
        .language-switch button.active { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; }
        .language-switch span { color: var(--muted); font-size: 9px; }

        main {
            position: relative;
            z-index: 1;
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 22px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .card {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 18px;
            border-radius: 18px;
            background: var(--card);
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            transition: transform .25s ease, background .25s ease, border-color .25s ease, box-shadow .25s ease;
        }
        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-soft), transparent 55%);
            opacity: 0;
            transition: opacity .25s ease;
        }
        .card:hover {
            transform: translateY(-6px);
            background: var(--card-hover);
            border-color: var(--accent1);
            box-shadow: 0 22px 45px -20px var(--accent1);
        }
        .card:hover::before { opacity: 1; }

        .icon-wrap {
            position: relative;
            flex-shrink: 0;
            width: 50px; height: 50px;
            border-radius: 13px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .icon-wrap img { width: 36px; height: 36px; object-fit: contain; display: block; }
        .icon-wrap .fallback {
            display: none;
            width: 100%; height: 100%;
            align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; color: #fff;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
        }

        .info { position: relative; z-index: 1; flex: 1; min-width: 0; }
        .info h2 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .info p {
            font-size: 13px;
            color: var(--muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .arrow {
            position: relative; z-index: 1;
            flex-shrink: 0;
            color: var(--muted);
            font-size: 18px;
            transition: transform .25s ease, color .25s ease;
        }
        .card:hover .arrow { color: var(--accent1); transform: translate(-4px, -4px); }

        footer {
            position: relative; z-index: 1;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
    <style id="compact-portfolio-layout">
        /* المقاسات المدمجة المعتمدة، مستوحاة من واجهة ملف إنجاز المعلم. */
        body { height: 100vh; min-height: 0; padding: 10px; overflow: hidden; }
        .page-frame { position: relative; z-index: 0; height: 100%; min-height: 0; overflow: hidden; border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; }
        header { flex: 0 0 auto; padding: 11px 20px; }
        .badge { width: 46px; height: 46px; margin: 0 auto 7px; border-radius: 13px; font-size: 24px; }
        header h1 { font-size: 17px; font-weight: 700; }
        header p { margin-top: 4px; font-size: 13px; font-weight: 600; }
        main { flex: 1 1 auto; width: 100%; min-height: 0; max-width: 1300px; padding: 0.4cm 16px 7px; }
        .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 11px; }
        .card, .card.featured { min-height: 0; padding: 11px 10px; gap: 11px; border-radius: 13px; grid-column: auto; }
        .icon-wrap { width: 46px; height: 46px; border-radius: 50%; }
        .icon-wrap img, .icon-wrap svg.brand-icon { width: 33px; height: 33px; padding: 0; }
        .info h2 { margin-bottom: 2px; font-size: 13.5px; font-weight: 700; line-height: 1.45; }
        .info p { font-size: 12px; line-height: 1.35; }
        footer { flex: 0 0 auto; margin-top: 0; padding: 7px 20px; font-size: 13px; font-weight: 600; }
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
        @media (max-width: 680px) { body { height: auto; min-height: 100vh; overflow: auto; } .page-frame { height: auto; min-height: calc(100vh - 20px); } .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 460px) { .grid { grid-template-columns: 1fr; } }
    </style>
    <style id="layout-fill-v2">
        @media (min-width: 901px) {
            header { padding: 14px 20px 10px; }
            .badge { width: 56px; height: 56px; margin-bottom: 9px; font-size: 28px; }
            header h1 { font-size: 20px; }
            header p { font-size: 14px; }
            main { display: flex; flex-direction: column; padding: 0.4cm 20px 10px; }
            .grid { flex: 1; min-height: 0; grid-template-columns: repeat(3, minmax(0, 1fr)); grid-template-rows: 1fr; gap: 16px; }
            .card { grid-column: auto; height: 100%; justify-content: center; padding: 18px 22px; gap: 18px; }
            .icon-wrap { width: 72px; height: 72px; }
            .icon-wrap img { width: 50px; height: 50px; }
            .info h2 { font-size: 17px; }
            .info p { font-size: 13.5px; }
        }
    </style>
    <style id="content-cleanup-v3">
        .info p, .arrow { display: none !important; }
    </style>
<style id="icon-plates-v2">
.icon-wrap { --brand-bg:#fff; background:var(--brand-bg)!important; border-color:rgba(255,255,255,.52)!important; box-shadow:inset 0 0 0 1px rgba(15,23,42,.08),0 7px 16px rgba(2,6,23,.18); isolation:isolate; }
.card[href*="imdb.com"] .icon-wrap { --brand-bg:#f5c518; }
.card[href*="rottentomatoes"] .icon-wrap { --brand-bg:#fa320a; }
.card[href*="justwatch"] .icon-wrap { --brand-bg:#000; }
.card[href*="imdb.com"] .icon-wrap img,
.card[href*="rottentomatoes"] .icon-wrap img,
.card[href*="justwatch"] .icon-wrap img { width:78%!important; height:78%!important; }
</style>
</head>
